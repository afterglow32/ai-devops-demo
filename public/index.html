<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DevOps Demo — Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
    }
    .dashboard {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }
    .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .service-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .service-card:hover { border-color: #667eea; transform: translateY(-2px); }
    .service-icon { font-size: 32px; margin-bottom: 8px; }
    .service-name { font-weight: 600; color: #333; margin-bottom: 4px; }
    .service-status {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
    }
    .status-ok { background: #d4edda; color: #155724; }
    .status-err { background: #f8d7da; color: #721c24; }
    .status-unknown { background: #e2e3e5; color: #383d41; }
    .btn-check {
      background: #667eea;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 24px;
      width: 100%;
      transition: background 0.3s;
    }
    .btn-check:hover { background: #5a6fd6; }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>🚀 AI DevOps Demo</h1>
    <p class="subtitle">MySQL + Redis + JWT — 连接状态监控</p>

    <div class="service-grid">
      <div class="service-card">
        <div class="service-icon">🟢</div>
        <div class="service-name">Server</div>
        <span class="service-status status-ok">Running</span>
      </div>
      <div class="service-card" id="card-mysql">
        <div class="service-icon">🐬</div>
        <div class="service-name">MySQL</div>
        <span class="service-status status-unknown" id="status-mysql">Checking...</span>
      </div>
      <div class="service-card" id="card-redis">
        <div class="service-icon">🔴</div>
        <div class="service-name">Redis</div>
        <span class="service-status status-unknown" id="status-redis">Checking...</span>
      </div>
      <div class="service-card" id="card-jwt">
        <div class="service-icon">🔐</div>
        <div class="service-name">JWT</div>
        <span class="service-status status-unknown" id="status-jwt">Checking...</span>
      </div>
    </div>

    <button class="btn-check" onclick="checkHealth()">🔄 刷新状态</button>
  </div>

  <script>
    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();

        updateStatus('mysql', data.mysql === 'connected' ? 'ok' : 'err', data.mysql);
        updateStatus('redis', data.redis === 'connected' ? 'ok' : 'err', data.redis);
        updateStatus('jwt', data.server ? 'ok' : 'err', data.server ? 'Active' : 'Inactive');
      } catch (e) {
        updateStatus('mysql', 'err', 'API unreachable');
        updateStatus('redis', 'err', 'API unreachable');
        updateStatus('jwt', 'err', 'API unreachable');
      }
    }

    function updateStatus(service, state, text) {
      const el = document.getElementById('status-' + service);
      el.textContent = text;
      el.className = 'service-status status-' + (state === 'ok' ? 'ok' : 'err');
    }

    checkHealth();
  </script>
</body>
</html>
